apiVersion: v1
kind: Pod
metadata:
  name: chime
  namespace: doorbell
  labels:
    app: chime
spec:
  initContainers:
    - name: download
      image: curlimages/curl:latest
      command:
        - curl
        - -L
        - -o
        - /data/chime.opus
        - https://upload.wikimedia.org/wikipedia/commons/2/20/Airplane_Chime_Sound_Effect.opus
      volumeMounts:
        - name: data
          mountPath: /data
    - name: convert
      image: linuxserver/ffmpeg:latest
      command:
        - ffmpeg
        - -i
        - /data/chime.opus
        - /data/chime.mp3
      volumeMounts:
        - name: data
          mountPath: /data
  containers:
    - name: nginx
      image: nginx:alpine
      ports:
        - containerPort: 80
      volumeMounts:
        - name: data
          mountPath: /usr/share/nginx/html
  volumes:
    - name: data
      emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: chime
  namespace: doorbell
spec:
  selector:
    app: chime
  ports:
    - port: 6475
      targetPort: 80
