---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    email: <path:cluster-secrets:cluster-secrets#personalemail> # path:namespace:secret-name#key
    preferredChain: ""
    privateKeySecretRef:
      name: letsencrypt-production
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cert-manager-secrets
              key: cloudflare-api-token-secret

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: <path:cluster-secrets:cluster-secrets#personalemail> # path:namespace:secret-name#key
    preferredChain: ""
    privateKeySecretRef:
      name: letsencrypt-staging
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cert-manager-secrets
              key: cloudflare-api-token-secret


apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-route53
spec:
  acme:
    email: <path:cluster-secrets:cluster-secrets#personalemail>
    preferredChain: ""
    privateKeySecretRef:
      name: letsencrypt-route53
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
      - dns01:
          route53:
            region: us-east-1
            hostedZoneID: <path:cluster-secrets:cluster-secrets#r53zoneid>
            accessKeyIDSecretRef:
              name: cert-manager-secrets
              key: route53-access-key-id
            secretAccessKeySecretRef:
              name: cert-manager-secrets
              key: route53-secret-access-key
