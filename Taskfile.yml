version: '3'

tasks:

  terraform_apply:
    desc: Apply Terraform
    silent: true
    cmds:
      - terraform -chdir=terraform_proxmox apply

  set_k8s_context:
    desc: Set the k8s context to Talos
    silent: true
    cmds:
      - kubectl config set-context admin@talos

  install:gateway_api_crds:
    desc: Install Gateway API CRDs
    silent: true
    deps: [set_k8s_context]
    cmds:
      - kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.4.1/config/crd/standard/gateway.networking.k8s.io_gatewayclasses.yaml
      - kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.4.1/config/crd/standard/gateway.networking.k8s.io_gateways.yaml
      - kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.4.1/config/crd/standard/gateway.networking.k8s.io_httproutes.yaml
      - kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.4.1/config/crd/standard/gateway.networking.k8s.io_referencegrants.yaml
      - kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.4.1/config/crd/standard/gateway.networking.k8s.io_grpcroutes.yaml
      - kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.4.1/config/crd/experimental/gateway.networking.k8s.io_tlsroutes.yaml
      - kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.4.1/config/crd/experimental/gateway.networking.k8s.io_udproutes.yaml

  install:cilium:
    desc: Install Cilium
    silent: true
    cmds:
      - |
        cilium_helm_release=$(yq '.spec.sources[0].targetRevision' ./argocd/aoa_apps/apps/networking/cilium.yaml)
        sleep_seconds=10
        echo "Installing Cilium $cilium_helm_release in $sleep_seconds seconds"
        sleep $sleep_seconds

        helm template cilium oci://quay.io/cilium/charts/cilium --version $cilium_helm_release --namespace kube-system --values ./argocd/aoa_apps/values/cilium.yaml | kubectl apply -f -
        # helm template cilium oci://quay.io/cilium/charts/cilium --version 1.19.2 --namespace kube-system --values ./argocd/aoa_apps/values/cilium.yaml | kubectl apply -f -

  install:argocd:
    desc: Install ArgoCD
    silent: true
    cmds:
      - |
        argo_helm_release=$(yq '.spec.sources[0].targetRevision' ./argocd/aoa_apps/apps/argocd.yaml)
        sleep_seconds=10
        echo "Installing ArgoCD $argo_helm_release in $sleep_seconds seconds"
        sleep $sleep_seconds

        kubectl get namespace argocd >/dev/null 2>&1 || kubectl create namespace argocd
        kubectl config set-context --current --namespace=argocd
        helm repo add argo https://argoproj.github.io/argo-helm
        helm repo update argo
        # why --server-side.... because ApplicationSet CRD exceeds the size limit for client-side apply
        helm template argocd argo/argo-cd --version $argo_helm_release --namespace argocd --values ./argocd/aoa_apps/values/argocd.yaml | kubectl apply --server-side -f -

  stage:namespaces:
    desc: Apply namespace definitions from aoa_infra
    silent: true
    cmds:
      - kubectl apply -f argocd/aoa_infra/objects/namespaces/namespace.yaml

  stage:argocd-oci-repos:
    desc: Apply ArgoCD OCI repository secrets
    silent: true
    cmds:
      - kubectl apply -f argocd/aoa_apps/objects/argocd-objects/objects.yaml

  stage:onepassword_secrets:
    desc: Stage OnePassword Secrets
    silent: true
    cmds:
      - |
        kubectl get namespace onepassword >/dev/null 2>&1 || kubectl create namespace onepassword
        onepass_creds=$(op document get 'talos Credentials File')
        onepass_token=$(op item get 'talos Access Token Kubernetes operator' --format json --fields credential | jq -r .value)
        onepass_helm_release=connect-$(yq '.spec.source.targetRevision' argocd/aoa_infra/apps/onepassword.yaml)
        onepass_token=$onepass_token onepass_helm_release=$onepass_helm_release yq '.stringData.token = env(onepass_token), .metadata.labels."helm.sh/chart" = env(onepass_helm_release)' ./bootstrap/onepassword-token.yaml | kubectl apply -f -
        onepass_creds=$onepass_creds onepass_helm_release=$onepass_helm_release yq '.stringData."1password-credentials.json" = strenv(onepass_creds), .metadata.labels."helm.sh/chart" = env(onepass_helm_release)' ./bootstrap/op-credentials.yaml | kubectl apply -f -

  talos:genconfig:
    desc: Generate talos configs with talhelper
    silent: true
    dir: talos
    cmds:
      - talhelper genconfig

  talos:apply-config:
    desc: Apply generated talos configs
    silent: true
    env:
      TALOSCONFIG: talos/clusterconfig/talosconfig
    cmds:
      - talosctl apply-config --insecure -f talos/clusterconfig/talos-control-1.k8s.piccola.us.yaml -n control-1.k8s.piccola.us
      - talosctl apply-config --insecure -f talos/clusterconfig/talos-control-2.k8s.piccola.us.yaml -n control-2.k8s.piccola.us
      - talosctl apply-config --insecure -f talos/clusterconfig/talos-control-3.k8s.piccola.us.yaml -n control-3.k8s.piccola.us
      - talosctl apply-config --insecure -f talos/clusterconfig/talos-control-4.k8s.piccola.us.yaml -n control-4.k8s.piccola.us
      - talosctl apply-config --insecure -f talos/clusterconfig/talos-control-5.k8s.piccola.us.yaml -n control-5.k8s.piccola.us

  talos:bootstrap:
    desc: Bootstrap the talos cluster
    silent: true
    env:
      TALOSCONFIG: talos/clusterconfig/talosconfig
    cmds:
      - talosctl bootstrap -n control-1.k8s.piccola.us -e control-1.k8s.piccola.us

  talos:get-kubeconfig:
    desc: Get and merge the cluster kubeconfig (only required if you gen'd new talos secrets)
    silent: true
    env:
      TALOSCONFIG: talos/clusterconfig/talosconfig
    cmds:
      - talosctl kubeconfig --nodes control-1.k8s.piccola.us --endpoints control-1.k8s.piccola.us

  talos:reset-node:
    desc: "Reset a talos node and reboot. Use NODE=<ip> or NODE=all. Example: task talos:reset-node NODE=10.0.5.201"
    silent: true
    requires:
      vars: [NODE]
    env:
      TALOSCONFIG: talos/clusterconfig/talosconfig
    vars:
      TARGET: '{{if eq .NODE "all"}}10.0.5.201,10.0.5.202,10.0.5.203,10.0.5.204,10.0.5.205{{else}}{{.NODE}}{{end}}'
    cmds:
      - talosctl reset --reboot --graceful=false -n {{.TARGET}}

  argocd:getadminsecret:
    desc: Get the ArgoCD initial admin secret
    silent: true
    cmds:
      - kubectl get secret -n argocd argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 --decode; echo

  ha-codeserver:getpassword:
    desc: Get the HA code-server password
    silent: true
    cmds:
      - kubectl exec -n home-assistant -c codeserver $(kubectl get pod -n home-assistant -o jsonpath='{.items[0].metadata.name}') -- cat /home/coder/.config/code-server/config.yaml| grep '^password:' | awk '{print $2}'

  # argocd:login:
  #   desc: blah
  #   silent: true
  #   vars:
  #     PASSWORD:
  #       sh: task argocd:getadminsecret
  #   cmds:
  #     # - echo {{.PASSWORD}}
  #     - argocd login argocd-k8s.piccola.us:443 --username admin --password '{{.PASSWORD}}' --plaintext

  talos:wipe-nvme:
    desc: Wipe nvme0n1 on all nodes
    silent: false
    env:
      TALOSCONFIG: talos/clusterconfig/talosconfig
    cmds:
      - echo "!! WARNING WIPING NVME0N1 ON ALL NODES IN 10 SECONDS !!"
      - sleep 10
      - talosctl wipe disk nvme0n1 --insecure -n control-1.k8s.piccola.us
      - talosctl wipe disk nvme0n1 --insecure -n control-2.k8s.piccola.us
      - talosctl wipe disk nvme0n1 --insecure -n control-3.k8s.piccola.us
      - talosctl wipe disk nvme0n1 --insecure -n control-4.k8s.piccola.us
      - talosctl wipe disk nvme0n1 --insecure -n control-5.k8s.piccola.us

  k8s:cordon:
    desc: "Cordon a Kubernetes node"
    silent: true
    vars:
      NODE: "{{ .NODE }}"
    preconditions:
      - sh: test -n "{{ .NODE }}"
        msg: "NODE is required: task talos:cordon NODE=<node>"
    cmds:
      - echo "Cordoning {{ .NODE }}..."
      - kubectl cordon {{ .NODE }}

  talos:reboot:
    desc: "Reboot a Talos node"
    silent: true
    env:
      TALOSCONFIG: "talos/clusterconfig/talosconfig"
    vars:
      NODE: "{{ .NODE }}"
    preconditions:
      - sh: test -n "{{ .NODE }}"
        msg: "NODE is required: task talos:reboot NODE=<node>"
    cmds:
      - echo "Rebooting {{ .NODE }}..."
      - talosctl reboot -n {{ .NODE }}

  talos:cordon-and-reboot:
    desc: "Cordon then reboot a node (parent task)"
    vars:
      NODE: "{{ .NODE }}"
    preconditions:
      - sh: test -n "{{ .NODE }}"
        msg: "NODE is required: task talos:cordon-and-reboot NODE=<node>"
    cmds:
      - task: k8s:cordon
        vars:
          NODE: "{{ .NODE }}"
      # only run reboot if previous step succeeded
      - task: talos:reboot
        vars:
          NODE: "{{ .NODE }}"

  restart:media:
    desc: Restart all media deployments
    cmds:
      - |
        for ns in sabnzbd radarr sonarr plex tautulli overseerr; do
          echo "Restarting $ns..."
          kubectl rollout restart deployment/$ns -n $ns
        done

  argocd:suspend:
    desc: "Suspend ArgoCD automated sync for an app (allows manual scaling). Usage: task argocd:suspend APP=<app>"
    silent: true
    vars:
      APP: "{{ .APP }}"
    preconditions:
      - sh: test -n "{{ .APP }}"
        msg: "APP is required: task argocd:suspend APP=<app>"
    cmds:
      - echo "Suspending automated sync for {{ .APP }}..."
      - kubectl patch application {{ .APP }} -n argocd --type merge -p '{"spec":{"syncPolicy":{"automated":null}}}'
      - echo "Done. ArgoCD will no longer self-heal {{ .APP }}."

  argocd:resume:
    desc: "Resume ArgoCD automated sync for an app and trigger a sync. Usage: task argocd:resume APP=<app>"
    silent: true
    vars:
      APP: "{{ .APP }}"
    preconditions:
      - sh: test -n "{{ .APP }}"
        msg: "APP is required: task argocd:resume APP=<app>"
    cmds:
      - echo "Resuming automated sync for {{ .APP }}..."
      - kubectl patch application {{ .APP }} -n argocd --type merge -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
      - echo "Done. ArgoCD will now self-heal {{ .APP }} back to desired state."

  stateful:suspend-all:
    desc: Suspend ArgoCD sync and scale down all stateful apps to zero replicas
    silent: true
    vars:
      STATEFUL_APPS: home-assistant frigate sonarr radarr unifi esphome plex sabnzbd tautulli overseerr uptime-kuma
    cmds:
      - for: { split: " ", var: STATEFUL_APPS }
        cmd: |
          echo "Suspending {{ .ITEM }}..."
          kubectl patch application {{ .ITEM }} -n argocd --type merge -p '{"spec":{"syncPolicy":{"automated":null}}}'
          kubectl scale deployment --all -n {{ .ITEM }} --replicas=0
          echo "Done {{ .ITEM }}"

  pvc:browse:
    desc: "Spin up a temp pod to browse/edit a PVC. Usage: task pvc:browse PVC=<pvc> NS=<namespace>"
    silent: true
    vars:
      PVC: "{{ .PVC }}"
      NS: "{{ .NS }}"
    preconditions:
      - sh: test -n "{{ .PVC }}"
        msg: "PVC is required: task pvc:browse PVC=<pvc> NS=<namespace>"
      - sh: test -n "{{ .NS }}"
        msg: "NS is required: task pvc:browse PVC=<pvc> NS=<namespace>"
    cmds:
      - |
        NS="{{ .NS }}"
        PVC="{{ .PVC }}"
        kubectl delete pod pvc-browser -n $NS --ignore-not-found --wait=true 2>/dev/null || true
        echo "Spinning up browser pod for PVC '$PVC' in '$NS'..."
        kubectl apply -n $NS -f - <<EOF
        apiVersion: v1
        kind: Pod
        metadata:
          name: pvc-browser
        spec:
          containers:
            - name: browser
              image: alpine
              command: ["sleep", "infinity"]
              volumeMounts:
                - mountPath: /data
                  name: pvc
          volumes:
            - name: pvc
              persistentVolumeClaim:
                claimName: $PVC
          restartPolicy: Never
        EOF
        kubectl wait pod/pvc-browser -n $NS --for=condition=Ready --timeout=60s
        echo "Data is at /data. Exit the shell when done - pod will be removed."
        trap "kubectl delete pod pvc-browser -n $NS --ignore-not-found --wait=false 2>/dev/null; echo 'Pod removed.'" EXIT
        kubectl exec -it pvc-browser -n $NS -- sh
